<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>User Management System</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="style.css">

</head>
<body>
<div class="container">
<header class="app-header">
  <h1>User Management</h1>
</header>



  <div class="card p-4 shadow-sm">

    <input id="name" class="form-control mb-3" placeholder="Enter Name">
    <input id="email" type="email" class="form-control mb-3" placeholder="Enter Email" required>


    <button class="btn btn-primary w-100" onclick="saveUser()">Save User</button>

  </div>

  <h3 class="mt-4">Users List</h3>
<input id="search" class="form-control mb-3" placeholder="Search by name..." onkeyup="filterUsers()">
<button class="btn btn-secondary mb-3" onclick="sortUsers()">Sort A–Z</button>
<p id="loading" style="display:none;">Loading users...</p>

<ul id="list" class="list-group mt-3"></ul>
<div class="mt-3 text-center">
  <button class="btn btn-outline-primary btn-sm" onclick="prevPage()">Prev</button>
  <span id="pageNo" class="mx-2">1</span>
  <button class="btn btn-outline-primary btn-sm" onclick="nextPage()">Next</button>
</div>
<footer class="app-footer">
  <p>© 2026 User Management App</p>
</footer>

</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<script src="script.js"></script>
</body>
</html>
